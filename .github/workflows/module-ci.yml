name: Module CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.0)"
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: module

      - uses: actions/checkout@v4
        with:
          repository: vo-lang/volang
          path: volang

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify release state
        working-directory: volang
        run: cargo run -p vo --release -- release verify ../module

      - name: Check module
        working-directory: volang
        run: ./d.py --release check ../module

      - name: Test module
        working-directory: volang
        run: |
          if [ -d ../module/tests ]; then
            ./d.py test both --release ../module/tests
          else
            echo "no tests directory"
          fi

  release_assets:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: module

      - uses: actions/checkout@v4
        with:
          repository: vo-lang/volang
          path: volang

      - uses: dtolnay/rust-toolchain@stable

      - name: Determine release version
        id: version
        run: |
          version="${{ github.event.release.tag_name || inputs.version }}"
          if [ -z "$version" ]; then
            echo "::error::version is required for workflow_dispatch"
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Stage release assets
        working-directory: volang
        run: |
          cargo run -p vo --release -- release stage ../module \
            --version "${{ steps.version.outputs.value }}" \
            --artifact extension-wasm wasm32-unknown-unknown zip.wasm ../module/zip.wasm \
            --out-dir ../module/release-dist

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: module/release-dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          files: module/release-dist/*
